version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: urlshort-postgres
    environment:
      POSTGRES_DB: urlshort
      POSTGRES_USER: urlshort
      POSTGRES_PASSWORD: urlshort
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urlshort"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache and Message Broker
  redis:
    image: redis:7-alpine
    container_name: urlshort-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshort-api
    environment:
      DATABASE_URL: postgresql+asyncpg://urlshort:urlshort@postgres:5432/urlshort
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENV: production
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshort-celery-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://urlshort:urlshort@postgres:5432/urlshort
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENV: production
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A workers.config:celery_app worker --loglevel=info --concurrency=4

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: urlshort-celery-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://urlshort:urlshort@postgres:5432/urlshort
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENV: production
      LOG_LEVEL: INFO
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    command: celery -A workers.config:celery_app beat --loglevel=info

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: urlshort-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  default:
    name: urlshort-network
